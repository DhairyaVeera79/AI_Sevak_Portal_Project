name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace api

      - name: Lint workspace
        run: npm run lint

      - name: Build workspace
        run: npm run build

      - name: API unit tests
        run: npm run test --workspace api -- --runInBand

      - name: API e2e tests
        run: npm run test:e2e --workspace api
