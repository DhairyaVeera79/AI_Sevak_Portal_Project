services:
  - type: web
    name: ai-sevak-portal-api
    runtime: node
    rootDir: services/api
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_SOURCE_MODE
        value: mock
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
